<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>咪咪日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { 
            background-color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; 
            padding-top: var(--safe-top); padding-bottom: calc(var(--safe-bottom) + 5rem);
            -webkit-tap-highlight-color: transparent;
        }
        .slate-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 28px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); overflow: hidden; }
        
        /* 統一方塊排列 */
        .check-item { 
            @apply flex flex-col items-center justify-center rounded-[22px] transition-all duration-300 border-2 border-slate-50 bg-white shadow-sm relative; 
            aspect-ratio: 1 / 1; padding: 0.5rem; touch-action: manipulation; 
        }
        .check-icon-empty { @apply text-xl mb-1 flex items-center justify-center h-8 transition-all opacity-20; }
        .label-text { @apply flex items-center justify-center text-center font-extrabold text-slate-700 leading-tight h-6 text-[0.85rem] w-full; }
        .time-text { @apply flex items-center justify-center font-bold text-slate-400 h-4 mt-1 text-[0.65rem]; }

        .check-item.active { @apply bg-slate-800 border-slate-700 shadow-lg scale-[0.96]; }
        .check-item.active .label-text { @apply text-white; }
        .check-item.active .check-icon-empty { @apply scale-110 opacity-100; }

        /* 底部導覽列 */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid #e2e8f0; padding-bottom: var(--safe-bottom);
            display: flex; justify-content: space-around; z-index: 1000;
        }
        .nav-item { @apply flex flex-col items-center py-3 px-6 transition-all opacity-30; }
        .nav-item.active { @apply opacity-100 scale-110 text-slate-900; }
        .nav-item span:first-child { @apply text-2xl mb-1; }
        .nav-item span:last-child { @apply text-[9px] font-black uppercase tracking-widest; }

        /* 分頁切換 */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tag-btn { @apply px-3 py-1.5 rounded-xl bg-slate-50 text-slate-700 font-bold text-xs border-2 border-slate-100 active:bg-slate-200 transition-all; }
        #auth-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="px-4 text-slate-800">

    <div id="auth-overlay">
        <div class="text-center p-8 bg-white rounded-[40px] shadow-2xl border border-slate-200 max-w-xs w-full mx-4">
            <div class="text-5xl mb-6">🔒</div>
            <h2 class="text-xl font-black text-slate-800 mb-6 tracking-tight">MIMI DIARY</h2>
            <input type="password" id="passInput" pattern="\d*" inputmode="numeric" placeholder="••••" 
                class="w-full text-center text-3xl tracking-[0.5em] p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 outline-none focus:border-slate-800 transition-all">
            <button onclick="verifyPass()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black tracking-widest active:scale-95 transition-all text-lg shadow-lg">進入系統</button>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto opacity-0 transition-opacity duration-700 pointer-events-none">
        
        <div id="page-today" class="page active space-y-6 pt-6">
            <div class="flex justify-between items-end px-1">
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter italic">TODAY</h1>
                <p id="dateBanner" class="text-[10px] text-slate-400 font-bold tracking-widest uppercase"></p>
            </div>

            <section class="slate-panel p-6 border-t-[10px] border-t-slate-800">
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between items-end mb-4 px-1">
                            <span class="text-xl font-black text-slate-800">☀️ Morning</span>
                            <span id="prog-morning" class="text-[10px] font-black text-slate-400">0 / 3</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cloudToggle('早上-💊癲癇1')" id="box-m0" class="check-item !aspect-auto py-4">
                                <span id="icon-m0" class="check-icon-empty">⬜</span>
                                <span class="label-text">💊 癲癇 1</span>
                                <span id="time-m0" class="time-text">--:--</span>
                            </button>
                            <button onclick="cloudToggle('早上-💊癲癇2')" id="box-m1" class="check-item !aspect-auto py-4">
                                <span id="icon-m1" class="check-icon-empty">⬜</span>
                                <span class="label-text">💊 癲癇 2</span>
                                <span id="time-m1" class="time-text">--:--</span>
                            </button>
                            <button onclick="cloudToggle('早上-🌿中藥')" id="box-m2" class="check-item !aspect-auto py-4">
                                <span id="icon-m2" class="check-icon-empty">⬜</span>
                                <span class="label-text">🌿 中藥</span>
                                <span id="time-m2" class="time-text">--:--</span>
                            </button>
                        </div>
                    </div>
                    <div class="border-t border-slate-100 pt-6">
                        <div class="flex justify-between items-end mb-4 px-1">
                            <span class="text-xl font-black text-slate-800">🌙 Night</span>
                            <span id="prog-night" class="text-[10px] font-black text-slate-400">0 / 4</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cloudToggle('晚上-💊癲癇1')" id="box-n0" class="check-item !aspect-auto py-4">
                                <span id="icon-n0" class="check-icon-empty">⬜</span>
                                <span class="label-text">💊 癲癇 1</span>
                                <span id="time-n0" class="time-text">--:--</span>
                            </button>
                            <button onclick="cloudToggle('晚上-💊癲癇2')" id="box-n1" class="check-item !aspect-auto py-4">
                                <span id="icon-n1" class="check-icon-empty">⬜</span>
                                <span class="label-text">💊 癲癇 2</span>
                                <span id="time-n1" class="time-text">--:--</span>
                            </button>
                            <button onclick="cloudToggle('晚上-🌿中藥')" id="box-n2" class="check-item !aspect-auto py-4">
                                <span id="icon-n2" class="check-icon-empty">⬜</span>
                                <span class="label-text">🌿 中藥</span>
                                <span id="time-n2" class="time-text">--:--</span>
                            </button>
                            <button onclick="cloudToggle('晚上-🩸高血壓')" id="box-n3" class="check-item !aspect-auto py-4">
                                <span id="icon-n3" class="check-icon-empty">⬜</span>
                                <span class="label-text">🩸 高血壓</span>
                                <span id="time-n3" class="time-text">--:--</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page-symptom" class="page space-y-6 pt-6">
            <h1 class="text-2xl font-black text-slate-800 italic px-1">SYMPTOM</h1>
            <section class="slate-panel p-5 border-t-[8px] border-t-slate-500">
                <div class="flex gap-2 mb-4">
                    <input type="date" id="symDate" class="flex-[3] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm outline-none">
                    <input type="time" id="symTime" class="flex-[3] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm outline-none">
                    <button onclick="resetInputTime()" class="flex-1 bg-slate-800 text-white rounded-xl font-black text-[9px]">現在</button>
                </div>
                <div class="flex flex-wrap gap-1.5 mb-4">
                    <button onclick="addTag('✨ 精神好')" class="tag-btn">✨ 精神好</button>
                    <button onclick="addTag('💩 便祕')" class="tag-btn">💩 便祕</button>
                    <button onclick="addTag('🤮 嘔吐')" class="tag-btn">🤮 嘔吐</button>
                    <button onclick="addTag('🚨 癲癇發作')" class="px-3 py-1.5 rounded-xl bg-red-600 text-white font-black text-xs">🚨 癲癇發作</button>
                </div>
                <textarea id="noteInput" placeholder="描述細節..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-base mb-4 h-24 outline-none focus:bg-white transition-all"></textarea>
                <div class="flex gap-2">
                    <button onclick="clearInput()" class="flex-1 bg-slate-300 text-slate-600 py-4 rounded-2xl font-black">清除</button>
                    <button onclick="cloudSaveSymptom()" class="flex-[2] bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg">儲存紀錄</button>
                </div>
            </section>
            
            <div id="symptomOnlyList" class="space-y-3 pb-10"></div>
        </div>

        <div id="page-history" class="page space-y-6 pt-6">
            <div class="flex justify-between items-center px-1">
                <h1 class="text-2xl font-black text-slate-800 italic">HISTORY</h1>
                <button onclick="exportToCSV()" class="bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-black text-[10px]">CSV</button>
            </div>
            <div id="medList" class="space-y-3 pb-10"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <button onclick="switchTab('today')" id="nav-today" class="nav-item active">
            <span>📋</span><span>Today</span>
        </button>
        <button onclick="switchTab('symptom')" id="nav-symptom" class="nav-item">
            <span>🩺</span><span>Symptom</span>
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="nav-item">
            <span>📜</span><span>History</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const SECRET = "0410";
        const firebaseConfig = {
            apiKey: "AIzaSyB1ZbRISZunnzBapdMk-VZiYbq2PFIU7Vw",
            authDomain: "mimi-healthy.firebaseapp.com",
            projectId: "mimi-healthy",
            storageBucket: "mimi-healthy.firebasestorage.app",
            messagingSenderId: "550078016256",
            appId: "1:550078016256:web:35d24f96fb33a478f7a1e5",
            measurementId: "G-V0T6833N71"
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
            window.scrollTo(0, 0);
        };

        window.verifyPass = () => {
            const val = document.getElementById('passInput').value;
            if (val === SECRET) {
                localStorage.setItem('mimi_auth_v3', SECRET);
                startApp();
            } else { alert("密碼錯誤"); document.getElementById('passInput').value = ''; }
        };

        function startApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').classList.remove('opacity-0', 'pointer-events-none');
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const recordsCol = collection(db, "cat_records");

            const q = query(recordsCol, orderBy("timestamp", "desc"), limit(60));
            onSnapshot(q, (snapshot) => {
                const records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUI(records, db);
            });

            window.cloudToggle = async (name) => {
                const today = new Date().toISOString().split('T')[0];
                const qCheck = query(recordsCol, where("date", "==", today), where("content", "==", name + " (完成)"));
                const check = await getDocs(qCheck);
                if (!check.empty) return;
                await addDoc(recordsCol, { date: today, time: new Date().toTimeString().substring(0, 5), content: name + " (完成)", type: 'med', timestamp: Date.now() });
            };

            window.cloudSaveSymptom = async () => {
                const content = document.getElementById('noteInput').value.trim();
                if (!content) return;
                await addDoc(recordsCol, { date: document.getElementById('symDate').value, time: document.getElementById('symTime').value, content, type: 'symptom', timestamp: Date.now() });
                document.getElementById('noteInput').value = '';
            };

            window.del = async (id) => { if (confirm("確定刪除？")) await deleteDoc(doc(db, "cat_records", id)); };
        }

        if (localStorage.getItem('mimi_auth_v3') === SECRET) startApp();

        function renderUI(records) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateBanner').innerText = today;
            const todayLogs = records.filter(r => r.date === today);
            
            const M_MEDS = ['早上-💊癲癇1', '早上-💊癲癇2', '早上-🌿中藥'];
            const N_MEDS = ['晚上-💊癲癇1', '晚上-💊癲癇2', '晚上-🌿中藥', '晚上-🩸高血壓'];

            const updateGrid = (meds, prefix) => {
                meds.forEach((name, i) => {
                    const log = todayLogs.find(r => r.content.includes(name));
                    const btn = document.getElementById(`box-${prefix}${i}`);
                    if(btn) {
                        btn.classList.toggle('active', !!log);
                        document.getElementById(`icon-${prefix}${i}`).innerText = log ? "✅" : "⬜";
                        document.getElementById(`time-${prefix}${i}`).innerText = log ? log.time : "--:--";
                    }
                });
            };
            updateGrid(M_MEDS, 'm'); updateGrid(N_MEDS, 'n');
            document.getElementById('prog-morning').innerText = `${todayLogs.filter(r => M_MEDS.some(m => r.content.includes(m))).length}/3`;
            document.getElementById('prog-night').innerText = `${todayLogs.filter(r => N_MEDS.some(m => r.content.includes(m))).length}/4`;

            const renderList = (data, border) => data.map(r => `
                <div class="bg-white p-4 border-l-[6px] ${r.content.includes('🚨') ? 'border-red-500 bg-red-50' : border} shadow-sm rounded-r-2xl relative mb-3">
                    <div class="flex justify-between items-center mb-1 text-[9px] font-black text-slate-300">
                        <span>${r.date} ${r.time}</span>
                        <button onclick="del('${r.id}')" class="px-2">✕</button>
                    </div>
                    <p class="text-slate-700 text-sm font-bold leading-relaxed">${r.content}</p>
                </div>`).join('');

            document.getElementById('medList').innerHTML = renderList(records.filter(r => r.type === 'med'), 'border-slate-300');
            document.getElementById('symptomOnlyList').innerHTML = renderList(records.filter(r => r.type === 'symptom'), 'border-slate-400');
        }

        window.resetInputTime = () => {
            const now = new Date();
            document.getElementById('symDate').value = now.toISOString().split('T')[0];
            document.getElementById('symTime').value = now.toTimeString().substring(0, 5);
        };
        window.clearInput = () => { if (confirm("清空？")) document.getElementById('noteInput').value = ''; };
        window.addTag = (tag) => {
            const input = document.getElementById('noteInput');
            input.value = input.value ? input.value + '、' + tag : tag;
        };
        window.exportToCSV = () => alert("匯出請至 Firebase。");
        resetInputTime();
    </script>
</body>
</html>
