<!DOCTYPE html>
<html lang="zh-Hant">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>money-RPG</title>
    <style>
        :root {
            --gold: #ffd700; --bg: #0f0c29; --success: #00ff88;
            --danger: #ff4d4d; --info: #4da6ff; --panel-bg: rgba(255, 255, 255, 0.08);
            --select-glow: rgba(255, 215, 0, 0.5);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; font-family: sans-serif; margin: 0; padding: 0; 
            min-height: 100vh; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* --- 浮動文字特效 --- */
        .floating-msg {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; text-align: center; font-weight: 900; pointer-events: none;
            text-shadow: 0 0 15px rgba(0,0,0,1); line-height: 1.3;
            animation: floatUpSlow 1.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes floatUpSlow {
            0% { transform: translate(-50%, 0%) scale(0.3); opacity: 0; }
            10% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            80% { transform: translate(-50%, -70%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(0.8); opacity: 0; }
        }

        .fx-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0; }
        #fx-thunder { background: white; }
        #fx-heal { background: radial-gradient(circle, var(--success) 0%, transparent 70%); }
        .active-fx { animation: flash-anim 0.6s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0.6; } 100% { opacity: 0; } }

        .container { width: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding: 30px 15px; }
        .glass-box { 
            background: var(--panel-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); 
            padding: 30px 15px 15px; position: relative; backdrop-filter: blur(10px);
            margin-bottom: 10px;
        }
        .box-title { 
            font-size: 1.1rem; font-weight: 900; color: var(--gold); 
            position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
            background: #1e1e3f; padding: 5px 25px; border-radius: 10px; 
            border: 2px solid var(--gold); white-space: nowrap;
        }
        .monster-selector { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .monster-opt { border: 2px solid transparent; border-radius: 12px; cursor: pointer; background: rgba(0,0,0,0.3); transition: 0.2s; }
        .monster-opt.selected { border-color: var(--gold); background: rgba(255,215,0,0.2); transform: scale(1.1); }
        .monster-opt img { width: 45px; height: 45px; display: block; }
        .input-row { display: flex; gap: 8px; }
        input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; color: white; flex: 1; outline: none; font-size: 1rem; text-align: center; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; padding: 0 20px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-attack { background: var(--danger); color: #fff; flex: 1; height: 50px; font-size: 1.2rem; }

        /* --- 排名清單 --- */
        .rank-list { width: 100%; display: flex; flex-direction: column; }
        .rank-item { 
            margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 18px; cursor: pointer; border: 2px solid transparent; 
            transition: all 0.5s ease; position: relative;
        }
        .is-active-target { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--select-glow); background: rgba(255,215,0,0.1); }
        .is-dead { filter: grayscale(100%); opacity: 0.7; }
        
        /* --- 功能按鈕統一化：歸零 & 刪除 --- */
        .action-btns { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 20; }
        
        /* 統一按鈕基礎樣式 */
        .tool-btn { 
            border-radius: 8px; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; 
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        /* 刪除按鈕樣式 */
        .del-btn-style { 
            background: rgba(255, 77, 77, 0.15); color: var(--danger); 
            border-color: rgba(255, 77, 77, 0.3); 
        }
        /* 歸零按鈕樣式 (對齊刪除按鈕風格) */
        .reset-btn-style { 
            background: rgba(77, 166, 255, 0.15); color: var(--info); 
            border-color: rgba(77, 166, 255, 0.3); 
        }
        
        .status-tag { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 5px; display: inline-block; }
        .tag-dead { background: #333; color: #fff; }
        .tag-alive { background: var(--success); color: #000; }

        .track { height: 35px; position: relative; margin: 35px 0 5px 0; background: rgba(0,0,0,0.3); border-radius: 17px; }
        .progress-bar { position: absolute; top: 50%; left: 8px; right: 8px; height: 6px; background: #111; border-radius: 3px; transform: translateY(-50%); overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.8s ease-out; }
        .avatar-container { position: absolute; top: 50%; transform: translate(-50%, -50%); transition: left 0.8s; z-index: 10; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; }
        .boss-icon { position: absolute; top: -26px; font-size: 22px; transform: translateX(-50%); transition: 0.3s; z-index: 5; }
    </style>
</head>
<body>

    <div id="fx-thunder" class="fx-overlay"></div>
    <div id="fx-heal" class="fx-overlay"></div>

    <div class="container">
        <div class="glass-box">
            <div class="box-title">🏆 英雄殿堂</div>
            <div class="monster-selector">
                <div class="monster-opt selected" onclick="pickM('monster1.png', this)"><img src="monster1.png"></div>
                <div class="monster-opt" onclick="pickM('monster2.png', this)"><img src="monster2.png"></div>
                <div class="monster-opt" onclick="pickM('monster3.png', this)"><img src="monster3.png"></div>
                <div class="monster-opt" onclick="pickM('monster4.png', this)"><img src="monster4.png"></div>
            </div>
            <div class="input-row">
                <input type="text" id="name-in" placeholder="新英雄名稱" list="hero-history" onfocus="this.value=''">
                <datalist id="hero-history"></datalist>
                <button class="btn btn-gold" onclick="saveHero()">登錄</button>
            </div>
        </div>

        <div class="glass-box" id="battle-box" style="opacity:0.3; pointer-events:none;">
            <div class="box-title">⚔️ 戰鬥指揮部</div>
            <div id="target-hint" style="font-size:1.1rem; color:var(--gold); margin-bottom:12px; text-align:center; font-weight:bold;">尚未鎖定英雄</div>
            <div class="input-row">
                <input type="text" id="val-in" placeholder="威力值" inputmode="text" oninput="this.value = this.value.replace(/[^0-9.-]/g, '')">
                <button class="btn btn-attack" onclick="doAttack()">發動</button>
            </div>
        </div>
        <div class="rank-list" id="rank-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1ZbRISZunnzBapdMk-VZiYbq2PFIU7Vw",
            authDomain: "mimi-healthy.firebaseapp.com",
            projectId: "mimi-healthy",
            appId: "1:550078016256:web:23bf5effdbb337def7a1e5"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mRef = doc(db, "money-RPG", "money-RPG");

        let curImg = 'monster1.png';
        let activeName = '';
        let currentPlayers = {};
        const GOAL = 100000;

        function showMsg(v) {
            const a = Math.abs(v);
            let head = v > 0 ? (a >= 10000 ? "爆裂攻擊" : "命中目標") : (v < 0 ? "致命雷擊" : "數值歸零");
            let color = v > 0 ? (a >= 10000 ? "#f90" : "#ff0") : "#fff";
            const msg = document.createElement('div');
            msg.className = 'floating-msg';
            msg.style.color = color;
            msg.style.fontSize = a >= 10000 ? '2.5rem' : '1.8rem';
            msg.innerHTML = `${head}<br>${v > 0 ? '+' : ''}${v.toLocaleString()}`;
            document.body.appendChild(msg);
            triggerFx(v > 0 ? 'fx-heal' : 'fx-thunder');
            setTimeout(() => msg.remove(), 3000);
        }

        function triggerFx(id) {
            const el = document.getElementById(id);
            el.classList.remove('active-fx');
            void el.offsetWidth;
            el.classList.add('active-fx');
        }

        function init() {
            onSnapshot(mRef, (s) => { 
                if(s.exists()) {
                    currentPlayers = s.data().players || {};
                    render(currentPlayers);
                    updateDatalist(currentPlayers);
                }
            });
            const saved = localStorage.getItem('hero_moneyRPG');
            if(saved) { activeName = saved; document.getElementById('name-in').value = saved; unlock(); }
        }

        function updateDatalist(players) {
            const list = document.getElementById('hero-history');
            list.innerHTML = Object.keys(players).map(name => `<option value="${name}">`).join('');
        }

        window.pickM = (img, el) => {
            curImg = img;
            document.querySelectorAll('.monster-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.saveHero = async () => {
            const name = document.getElementById('name-in').value.trim();
            if(!name) return;
            activeName = name;
            localStorage.setItem('hero_moneyRPG', name);
            let p = { ...currentPlayers };
            if(!p[name]) p[name] = { img: curImg, total: 0 };
            await setDoc(mRef, { players: p });
            unlock();
        };

        window.deleteHero = async (name, event) => {
            event.stopPropagation();
            if(!confirm(`確定要刪除英雄 [${name}] 嗎？`)) return;
            let p = { ...currentPlayers };
            delete p[name];
            await setDoc(mRef, {players: p});
        };

        window.resetHero = async (name, event) => {
            event.stopPropagation();
            if(!confirm(`確定要將 [${name}] 的威力值歸零嗎？`)) return;
            let p = { ...currentPlayers };
            if(p[name]) {
                p[name].total = 0;
                await updateDoc(mRef, {players: p});
                showMsg(0);
            }
        };

        window.doAttack = async () => {
            const input = document.getElementById('val-in');
            const val = parseFloat(input.value);
            if(isNaN(val) || !activeName) return;
            const s = await getDoc(mRef);
            let p = s.data().players;
            p[activeName].total += val;
            await updateDoc(mRef, {players: p});
            showMsg(val);
            input.value = '';
            input.blur(); 
        };

        window.setTarget = (name) => {
            activeName = name;
            document.getElementById('name-in').value = name;
            localStorage.setItem('hero_moneyRPG', name);
            unlock();
            render(currentPlayers);
        };

        function unlock() {
            document.getElementById('battle-box').style.opacity = "1";
            document.getElementById('battle-box').style.pointerEvents = "auto";
            document.getElementById('target-hint').innerText = `🎯 鎖定：${activeName}`;
        }

        function render(players) {
            const box = document.getElementById('rank-box');
            const sorted = Object.entries(players).sort((a, b) => b[1].total - a[1].total);
            
            box.innerHTML = sorted.map(([name, data]) => {
                const pct = Math.max(0, Math.min((data.total / GOAL) * 100, 100));
                const isDead = data.total < 0;
                let title = pct >= 100 ? "🌟 傳說級冠冕" : (pct >= 60 ? "🔥 屠龍勇士" : (pct >= 30 ? "👻 幽靈獵手" : "初級冒險者"));
                return `
                    <div class="rank-item ${name === activeName ? 'is-active-target' : ''} ${isDead ? 'is-dead' : ''}" onclick="setTarget('${name}')">
                        <div class="action-btns">
                            <div class="tool-btn reset-btn-style" onclick="resetHero('${name}', event)">🔄 </div>
                            <div class="tool-btn del-btn-style" onclick="deleteHero('${name}', event)">🗑️  </div>
                        </div>

                        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px; padding-right:110px;">
                            <div style="font-size:1.1rem; font-weight:bold;">
                                <span style="font-size:0.75rem; color:var(--gold); margin-right:6px; opacity:0.9;">${title}</span>
                                <span>${isDead ?  name : name}</span>
                            </div>
                            <span class="status-tag ${isDead ? 'tag-dead' : 'tag-alive'}">${isDead ? '等待復活' : '⚔️ 征戰中'}</span>
                        </div>
                        <div style="color:${isDead ? '#fff' : 'var(--success)'}; font-weight:bold;">威力值: $${data.total.toLocaleString()}</div>
                        <div class="track">
                            <span class="boss-icon" style="left:30%; opacity:${pct>=30?0.2:1}">👻</span>
                            <span class="boss-icon" style="left:60%; opacity:${pct>=60?0.2:1}">🐉</span>
                            <span class="boss-icon" style="left:100%; opacity:${pct>=100?1:0.6}">👑</span>
                            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:linear-gradient(90deg, #ff4d4d, #00ff88);"></div></div>
                            <div class="avatar-container" style="left:${pct}%"><img src="${data.img}" class="avatar"></div>
                        </div>
                    </div>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
